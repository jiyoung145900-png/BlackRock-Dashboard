<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>블랙록 추천 종목</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
    
    body {
      margin: 0;
      padding: 30px;
      background: linear-gradient(135deg, #0c0f1a 0%, #1c2538 100%);
      font-family: 'Noto Sans KR', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .infographic {
      width: 100%;
      max-width: 820px;
      background: #0a0f1f;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.85);
      border: 1px solid rgba(234, 88, 12, 0.3);
    }

    .header {
      background: linear-gradient(90deg, #111827, #1f2937);
      padding: 32px 45px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(234, 88, 12, 0.2);
    }

    .logo {
      font-size: 48px;
      font-weight: 900;
      letter-spacing: -3px;
      color: white;
    }

    .title {
      font-size: 31px;
      font-weight: 700;
      color: #f8fafc;
    }

    .content {
      padding: 45px 50px;
    }

    .box {
      margin-bottom: 35px;
      border-radius: 18px;
      overflow: hidden;
    }

    .box-title {
      background: linear-gradient(90deg, #b45309, #f59e0b);
      padding: 18px 0;
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      color: white;
    }

    .box-content {
      background: #111827;
      min-height: 150px;
      border: 3px solid #f59e0b;
      border-top: none;
      padding: 32px;
      font-size: 37px;
      font-weight: 700;
      color: #fcd34d;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1.35;
      outline: none;
      position: relative;
    }

    .box-content::before {
      content: attr(data-placeholder);
      position: absolute;
      color: rgba(251, 191, 36, 0.25);
      font-size: 34px;
      pointer-events: none;
      display: none;
    }

    .box-content:empty::before {
      display: block;
    }

    .big-box .box-content {
      min-height: 320px;
      font-size: 56px;
      color: #fde047;
    }

    .big-box .box-content::before {
      font-size: 46px;
    }

    .download-btn {
      margin: 30px auto 35px;
      display: block;
      background: linear-gradient(90deg, #f59e0b, #fbbf24);
      color: #1e2937;
      border: none;
      padding: 18px 60px;
      font-size: 19px;
      font-weight: 700;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 12px 40px rgba(245, 158, 11, 0.5);
    }

    .download-btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 15px 45px rgba(245, 158, 11, 0.6);
    }
  </style>
</head>
<body>

  <div class="infographic" id="capture-area">
    <div class="header">
      <div class="logo">BlackRock®</div>
      <div class="title">블랙록 추천 종목</div>
    </div>

    <div class="content">
      <div class="box">
        <div class="box-title">추천 종목 명</div>
        <div class="box-content" id="stockName" contenteditable="true" data-placeholder="종목명을 입력하세요"></div>
      </div>

      <div class="box big-box">
        <div class="box-title">수익률</div>
        <div class="box-content" id="returnRate" contenteditable="true" data-placeholder="+000.0%"></div>
      </div>
    </div>
  </div>

  <button class="download-btn" onclick="downloadImage()">
    📥 이미지로 저장하기
  </button>

  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <script>
    function downloadImage() {
      const area = document.getElementById('capture-area');
      html2canvas(area, { scale: 2.8, backgroundColor: '#0a0f1f' }).then(canvas => {
        const link = document.createElement('a');
        link.download = '블랙록_추천종목.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      });
    }
  </script>
</body>
</html>
