<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlackRock 추천 종목</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
    
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
      font-family: 'Noto Sans KR', sans-serif;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 800px;
      background: rgba(15, 23, 42, 0.95);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(59, 130, 246, 0.3);
    }

    .header {
      background: linear-gradient(90deg, #1e40af, #3b82f6);
      padding: 25px 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .blackrock-logo {
      font-size: 42px;
      font-weight: 900;
      letter-spacing: -2px;
    }

    .title {
      font-size: 28px;
      font-weight: 700;
    }

    .content {
      padding: 30px;
    }

    .section {
      margin-bottom: 25px;
    }

    .section-title {
      background: #1e40af;
      padding: 14px 20px;
      font-size: 18px;
      font-weight: 700;
      border-radius: 12px 12px 0 0;
      text-align: center;
    }

    .section-content {
      background: #0f172a;
      min-height: 120px;
      border: 2px solid #1e40af;
      border-top: none;
      border-radius: 0 0 12px 12px;
      padding: 20px;
      font-size: 24px;
      font-weight: 700;
      color: #60a5fa;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1.4;
    }

    .big-section {
      margin-top: 30px;
    }

    .big-section .section-content {
      min-height: 320px;
      font-size: 32px;
      color: #93c5fd;
    }

    .footer-pattern {
      height: 8px;
      background: linear-gradient(90deg, #3b82f6, #60a5fa);
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 헤더 -->
    <div class="header">
      <div class="blackrock-logo">BlackRock®</div>
      <div class="title">블랙록 추천 종목</div>
    </div>

    <!-- 추천 종목명 -->
    <div class="content">
      <div class="section">
        <div class="section-title">추천 종목 명</div>
        <div class="section-content" id="stock-name">
          <!-- 여기에 종목명 입력 -->
        </div>
      </div>

      <!-- 수익률 -->
      <div class="section big-section">
        <div class="section-title">수익률</div>
        <div class="section-content" id="return-rate">
          <!-- 여기에 수익률 입력 (예: +128.4%) -->
        </div>
      </div>
    </div>

    <div class="footer-pattern"></div>
  </div>
</body>
</html>
