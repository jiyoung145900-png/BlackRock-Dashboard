<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackRock Official Report</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

        :root {
            --br-blue: #2c4e75;
            --br-accent: #00b4ff;
            --panel-bg: #f8fafc;
        }

        body {
            background-color: #d1dbe4;
            font-family: 'Noto Sans KR', sans-serif;
            display: flex; flex-direction: column; align-items: center; padding: 40px 0;
            margin: 0;
        }

        /* 메인 리포트 카드 */
        .report-card {
            width: 500px;
            background: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            border: 1px solid #cbd5e0;
        }

        /* 상단 헤더 */
        .header {
            background: #d1dbe4;
            padding: 20px 30px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 4px solid var(--br-blue);
        }

        .logo-area { font-size: 32px; font-weight: 900; color: #000; letter-spacing: -1.5px; }
        .title-area { text-align: right; }
        .main-title { 
            background: var(--br-blue); color: white; padding: 5px 15px; 
            font-size: 18px; font-weight: 700; border-radius: 4px;
        }
        .date-text { font-size: 15px; color: #4a5568; margin-top: 5px; font-weight: 900; }

        .content { padding: 30px; }

        /* 정보 박스 스타일 */
        .info-box {
            border: 1px solid #cbd5e0; border-radius: 10px;
            margin-bottom: 25px; background: #fff; overflow: hidden;
        }

        .box-header {
            background: var(--br-blue); color: white; text-align: center;
            padding: 10px; font-size: 15px; font-weight: 700;
        }

        .box-body {
            padding: 20px; text-align: center; font-size: 34px;
            font-weight: 900; color: #000; outline: none;
        }

        /* 수익률 섹션 */
        .profit-card {
            background: #334155; color: white; border-radius: 10px;
            padding: 25px; margin: 15px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.3);
            text-align: center;
        }

        .buy-call { font-size: 22px; font-weight: 700; margin-bottom: 10px; outline: none; }
        .sell-call { font-size: 20px; font-weight: 700; color: var(--br-accent); outline: none; }

        /* 리스트 영역 (계단 현상 방지 핵심) */
        .analysis-list {
            padding: 0 20px; color: #1a202c; font-size: 15px; line-height: 1.8;
            outline: none;
        }
        
        /* 표준 리스트 태그 활용으로 정렬 문제 해결 */
        .analysis-list ul {
            margin: 0; padding: 0; list-style-type: none;
        }

        .analysis-list li {
            position: relative;
            padding-left: 20px;
            margin-bottom: 10px;
            text-align: left;
        }

        .analysis-list li::before {
            content: '●'; position: absolute; left: 0; 
            font-size: 8px; color: #000; top: 1px;
        }

        .save-btn {
            margin-top: 30px; background: var(--br-blue); color: white;
            border: none; padding: 15px 40px; font-size: 17px; font-weight: 700;
            border-radius: 50px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="report-card" id="reportArea">
        <div class="header">
            <div class="logo-area">BlackRock.</div>
            <div class="title-area">
                <div class="main-title">블랙록 추천 종목</div>
                <div class="date-text" id="todayDate"></div>
            </div>
        </div>

        <div class="content">
            <div class="info-box">
                <div class="box-header">추천 종목 명</div>
                <div class="box-body" contenteditable="true">HMM 011200</div>
            </div>

            <div class="info-box">
                <div class="box-header">수익률</div>
                <div class="profit-card">
                    <div class="buy-call" contenteditable="true">매수 권장 : 21,270원 이하</div>
                    <div class="sell-call" contenteditable="true">매도 권장 : 매니저 사인 대기</div>
                </div>
            </div>

            <div class="analysis-list">
                <ul contenteditable="true">
                    <li>중동 리스크 확대 시 운임 상승 기대 → 실제 전쟁 국면 수혜</li>
                    <li>해운 업황 둔화 속에서도 두 자릿수 영업이익 유지</li>
                    <li>여기에 새로운 내용을 입력하세요 (엔터 치면 자동 정렬)</li>
                </ul>
            </div>
        </div>
    </div>

    <button class="save-btn" onclick="saveImage()">📥 고해상도 리포트 저장</button>

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script>
        // 날짜 설정
        const d = new Date();
        document.getElementById('todayDate').innerText = `${d.getMonth() + 1}월 ${d.getDate()}일`;

        async function saveImage() {
            const btn = document.querySelector('.save-btn');
            btn.innerText = "⏳ 저장 중...";
            const canvas = await html2canvas(document.getElementById('reportArea'), {
                scale: 3,
                useCORS: true,
                backgroundColor: "#d1dbe4"
            });
            const link = document.createElement('a');
            link.download = `Report_${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
            btn.innerText = "📥 고해상도 리포트 저장";
        }
    </script>
</body>
</html>
