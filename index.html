<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>멤버십 카드 생성기</title>
    <!-- 구글 폰트 불러오기 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Noto+Sans+KR:wght@300;500;700&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <!-- 이미지 캡처를 위한 html2canvas 라이브러리 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --bg-color: #f4f4f9;
            --card-bg: #ff6b6b; /* 카드 배경색 (코랄 핑크) */
            --gold: #d4af37;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        /* 컨트롤 패널 스타일 */
        .controls {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .controls h2 {
            margin-top: 0;
            font-size: 20px;
            color: #333;
            border-bottom: 2px solid var(--card-bg);
            padding-bottom: 10px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .input-group label {
            font-size: 13px;
            font-weight: 700;
            color: #555;
        }

        .input-group input[type="text"] {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: inherit;
        }

        .input-group input[type="file"] {
            font-size: 12px;
            padding: 5px 0;
        }

        button.download-btn {
            background-color: var(--card-bg);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }

        button.download-btn:hover {
            background-color: #ff5252;
        }

        /* 카드 캔버스 래퍼 */
        .card-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 실제 멤버십 카드 디자인 */
        .card {
            width: 800px;
            height: 450px;
            background-color: var(--card-bg);
            border: 2px solid white;
            position: relative;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            overflow: hidden;
            box-sizing: border-box;
        }

        /* 텍스트 요소 공통 */
        .card p { margin: 0; }

        /* 좌측 상단 텍스트 */
        .top-left {
            position: absolute;
            top: 40px;
            left: 40px;
            font-style: italic;
            font-weight: 300;
            font-size: 18px;
            line-height: 1.5;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* 우측 상단 텍스트 */
        .top-right {
            position: absolute;
            top: 35px;
            right: 40px;
            text-align: right;
        }
        .top-right .small-text {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 5px;
        }
        .top-right .big-eng {
            font-family: 'Montserrat', sans-serif;
            font-size: 38px;
            font-weight: 800;
            line-height: 0.9;
        }
        .top-right .cursive {
            font-family: 'Caveat', cursive;
            font-size: 32px;
            color: #0b2239; /* 다크 네이비 */
            margin-top: -15px;
            margin-right: -10px;
            position: relative;
            z-index: 2;
        }

        /* 중앙 로고 영역 */
        .center-logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 80%;
            max-height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .center-logo img {
            max-height: 120px;
            max-width: 100%;
            object-fit: contain;
            display: none; /* 이미지가 없으면 숨김 */
        }

        .center-logo .default-text {
            font-family: 'Caveat', cursive;
            font-size: 80px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        /* 좌측 하단 프로필 영역 */
        .profile-area {
            position: absolute;
            bottom: 60px;
            left: 50px;
            text-align: center;
        }
        .crown {
            font-size: 30px;
            line-height: 1;
            margin-bottom: -15px;
            position: relative;
            z-index: 2;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        .profile-img-box {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--gold);
            background-color: #ddd;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .profile-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 우측 하단 QR 영역 */
        .qr-area {
            position: absolute;
            bottom: 60px;
            right: 40px;
        }
        .qr-area img {
            width: 90px;
            height: 90px;
            background: white;
            padding: 5px;
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* 하단 정보 텍스트 (코디, 회원ID, 웹사이트) */
        .footer-info {
            position: absolute;
            bottom: 25px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            font-size: 18px;
            font-weight: 500;
        }
        .footer-info .left-info {
            display: flex;
            gap: 30px;
        }
        .footer-info .website {
            font-weight: 300;
            font-size: 16px;
        }

    </style>
</head>
<body>

    <!-- 컨트롤 패널 (입력 폼) -->
    <div class="controls">
        <h2>정보 입력란</h2>
        
        <div class="input-group">
            <label>담당 코디 번호</label>
            <input type="text" id="coord-input" value="10005" placeholder="예: 10005">
        </div>

        <div class="input-group">
            <label>회원 ID</label>
            <input type="text" id="member-input" value="kimcg12345" placeholder="예: kimcg12345">
        </div>

        <div class="input-group">
            <label>프로필 사진 업로드 (정방형 권장)</label>
            <input type="file" id="profile-upload" accept="image/*">
        </div>

        <div class="input-group">
            <label>QR 코드 업로드</label>
            <input type="file" id="qr-upload" accept="image/*">
        </div>

        <div class="input-group">
            <label>중앙 로고 업로드 (선택, 배경투명 PNG 권장)</label>
            <input type="file" id="logo-upload" accept="image/*">
        </div>

        <button class="download-btn" onclick="downloadCard()">카드 이미지로 저장하기</button>
    </div>

    <!-- 카드 미리보기 영역 -->
    <div class="card-wrapper">
        <div class="card" id="card-canvas">
            
            <!-- 좌측 상단 -->
            <div class="top-left">
                <p>설레이는 순간</p>
                <p>&nbsp;&nbsp;&nbsp;&nbsp;최고의 경험을 선사해 드립니다</p>
            </div>

            <!-- 우측 상단 -->
            <div class="top-right">
                <p class="small-text">전국 1등! 소개팅 만남 커뮤니티</p>
                <p class="big-eng">MEMBER</p>
                <p class="big-eng">SHIP <span class="cursive">for you</span></p>
            </div>

            <!-- 중앙 로고 / 텍스트 -->
            <div class="center-logo">
                <p class="default-text" id="default-logo-text">banada love</p>
                <img id="card-logo" src="" alt="custom-logo">
            </div>

            <!-- 프로필 사진 -->
            <div class="profile-area">
                <div class="crown">👑</div>
                <div class="profile-img-box">
                    <img id="card-profile" src="https://via.placeholder.com/150?text=Profile" alt="Profile">
                </div>
            </div>

            <!-- QR 코드 -->
            <div class="qr-area">
                <img id="card-qr" src="https://via.placeholder.com/100?text=QR" alt="QR Code">
            </div>

            <!-- 하단 텍스트 (코디, ID, 사이트 주소) -->
            <div class="footer-info">
                <div class="left-info">
                    <p>담당 코디: <span id="val-coord">10005</span></p>
                    <p>회원 ID: <span id="val-member">kimcg12345</span></p>
                </div>
                <div class="website">
                    <p>https://www.banadalove.com</p>
                </div>
            </div>

        </div>
    </div>

    <script>
        // 텍스트 실시간 반영
        document.getElementById('coord-input').addEventListener('input', function(e) {
            document.getElementById('val-coord').innerText = e.target.value;
        });

        document.getElementById('member-input').addEventListener('input', function(e) {
            document.getElementById('val-member').innerText = e.target.value;
        });

        // 이미지 업로드 공통 함수
        function handleImageUpload(inputId, targetId, isLogo = false) {
            const fileInput = document.getElementById(inputId);
            fileInput.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        const imgElement = document.getElementById(targetId);
                        imgElement.src = event.target.result;
                        
                        // 중앙 로고의 경우, 이미지가 올라오면 기본 텍스트를 숨김 처리
                        if(isLogo) {
                            imgElement.style.display = 'block';
                            document.getElementById('default-logo-text').style.display = 'none';
                        }
                    }
                    reader.readAsDataURL(file);
                }
            });
        }

        // 각 이미지 업로드 이벤트 바인딩
        handleImageUpload('profile-upload', 'card-profile');
        handleImageUpload('qr-upload', 'card-qr');
        handleImageUpload('logo-upload', 'card-logo', true);

        // 카드 이미지 다운로드 기능 (html2canvas 사용)
        function downloadCard() {
            const card = document.getElementById('card-canvas');
            
            html2canvas(card, {
                scale: 2, // 고해상도 저장
                backgroundColor: null
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'membership_card.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }
    </script>
</body>
</html>
