<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackRock 3D Infographic Generator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap');

        /* 원본 색상 및 3D 효과를 위한 변수 정의 */
        :root {
            --bg-metal: #d1dbe4; /* 원본 배경 회색조 */
            --br-blue: #2c4e75; /* 원본의 묵직한 블루 */
            --br-accent: #00b4ff; /* 매도 권장 텍스트 색상 */
            --card-shadow: 0 40px 100px rgba(0,0,0,0.18);
            --inset-shadow: inset 0 2px 5px rgba(0,0,0,0.15);
        }

        body {
            background-color: #f0f2f5;
            font-family: 'Noto Sans KR', sans-serif;
            display: flex; flex-direction: column; align-items: center; padding: 40px 0;
            margin: 0;
        }

        /* 1. 3D 리포트 메인 컨테이너 */
        .report-card {
            width: 500px;
            background: #ffffff;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            box-shadow: var(--card-shadow);
            border: 1px solid #cbd5e0;
        }

        /* 2. 3D 헤더 디자인 */
        .header {
            background: var(--bg-metal);
            padding: 20px 30px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 5px solid var(--br-blue);
            box-shadow: inset 0 -2px 5px rgba(0,0,0,0.1);
        }

        .logo-area { font-size: 32px; font-weight: 900; color: #000; letter-spacing: -1.5px; }
        .title-area { text-align: right; }
        .main-title { 
            background: var(--br-blue); color: white; padding: 5px 15px; 
            font-size: 18px; font-weight: 700; border-radius: 4px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        }
        .date-text { font-size: 15px; color: #4a5568; margin-top: 5px; font-weight: 900; }

        .content { padding: 30px; background: #fff; }

        /* 3. 3D 정보 박스 디자인 */
        .info-box {
            border: 1px solid #cbd5e0;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            overflow: hidden;
            background: #fff;
        }

        .box-header {
            background: linear-gradient(180deg, var(--br-blue) 0%, #1e3a5a 100%);
            color: white; text-align: center;
            padding: 10px; font-size: 15px; font-weight: 700;
        }

        .box-body {
            padding: 20px; text-align: center;
            font-size: 34px; font-weight: 900; color: #000;
            outline: none; position: relative;
        }

        /* 4. 수익률 전용 3D 박스 */
        .profit-card {
            background: #334155; color: white; border-radius: 10px;
            padding: 25px; margin: 15px;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.4);
            border: 1px solid rgba(0,0,0,0.2);
            text-align: center;
        }

        .buy-call { font-size: 22px; font-weight: 700; margin-bottom: 10px; outline: none; }
        .sell-call { font-size: 20px; font-weight: 700; color: var(--br-accent); outline: none; }

        /* 5. 분석 리스트 디자인 (계단현상 완전 박멸 핵심) */
        .analysis-section {
            padding: 0 10px;
        }

        /* 표준 ul, li 구조를 사용하여 정렬 문제 해결 */
        .analysis-list {
            margin: 0; padding: 0;
            list-style-type: none;
            color: #1a202c; font-size: 14.5px; line-height: 1.8;
            outline: none;
        }

        .analysis-list li {
            position: relative;
            padding-left: 20px;
            margin-bottom: 12px;
            text-align: left;
        }

        .analysis-list li::before {
            content: '●'; /* 불릿 모양 */
            position: absolute;
            left: 0;
            top: 1px; /* 글씨 높낮이 세밀 조정 */
            font-size: 8px;
            color: #000;
        }

        /* 저장 버튼 스타일 */
        .save-btn {
            margin-top: 30px;
            background: var(--br-blue);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(44, 78, 117, 0.3);
            transition: all 0.3s;
        }
        .save-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(44, 78, 117, 0.4);
        }
    </style>
</head>
<body>

    <div class="report-card" id="reportArea">
        <div class="header">
            <div class="logo-area">BlackRock.</div>
            <div class="title-area">
                <div class="main-title">블랙록 추천 종목</div>
                <div class="date-text" id="todayDate"></div>
            </div>
        </div>

        <div class="content">
            <div class="info-box">
                <div class="box-header">추천 종목 명</div>
                <div class="box-body" contenteditable="true">
                    HMM 011200
                </div>
            </div>

            <div class="info-box">
                <div class="box-header">수익률</div>
                <div class="profit-card">
                    <div class="buy-call" contenteditable="true">매수 권장 : 21,270원 이하</div>
                    <div class="sell-call" contenteditable="true">매도 권장 : 매니저 사인 대기</div>
                </div>
            </div>

            <div class="analysis-section">
                <ul class="analysis-list" contenteditable="true">
                    <li>중동 리스크 확대 시 운임 상승 기대 → 실제 전쟁 국면 수혜</li>
                    <li>해운 업황 둔화 속에서도 두 자릿수 영업이익 유지</li>
                    <li>AI + 지정학 + 업황 방어력 3가지가 동시에 붙은 핵심 종목</li>
                </ul>
            </div>
        </div>
    </div>

    <button class="save-btn" id="saveBtn">📥 리포트 이미지 저장</button>

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script>
        // 1. 오늘 날짜 자동 설정
        const d = new Date();
        document.getElementById('todayDate').innerText = `${d.getMonth() + 1}월 ${d.getDate()}일`;

        // 2. 이미지 다운로드 함수 (고해상도 유지)
        document.getElementById('saveBtn').addEventListener('click', async () => {
            const btn = document.getElementById('saveBtn');
            const area = document.getElementById('reportArea');
            
            btn.innerText = "⏳ 생성 중...";
            btn.style.opacity = "0.7";

            try {
                // 폰트 완전 로드 대기
                await document.fonts.ready;

                // 렌더링 안정화 지연
                setTimeout(() => {
                    html2canvas(area, {
                        scale: 3, // 고해상도
                        useCORS: true,
                        backgroundColor: "#f0f2f5",
                        logging: false
                    }).then(canvas => {
                        const link = document.createElement('a');
                        link.download = `BlackRock_Report_${Date.now()}.png`;
                        link.href = canvas.toDataURL();
                        link.click();
                        
                        btn.innerText = "📥 리포트 이미지 저장";
                        btn.style.opacity = "1";
                    });
                }, 100);
            } catch (err) {
                console.error("이미지 생성 실패:", err);
                alert("이미지 생성 중 오류가 발생했습니다.");
                btn.innerText = "📥 리포트 이미지 저장";
            }
        });
    </script>
</body>
</html>
