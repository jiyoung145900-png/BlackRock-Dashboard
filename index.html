<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>블랙록 추천 종목</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
    
    body {
      margin: 0;
      padding: 30px;
      background: linear-gradient(135deg, #0a1428 0%, #1a253f 100%);
      font-family: 'Noto Sans KR', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .infographic {
      width: 100%;
      max-width: 820px;
      background: rgba(10, 20, 40, 0.98);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8);
      border: 1px solid rgba(59, 130, 246, 0.35);
    }

    .header {
      background: linear-gradient(90deg, #0f2a6e, #1e4aa8);
      padding: 32px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 48px;
      font-weight: 900;
      letter-spacing: -3px;
      color: white;
    }

    .title {
      font-size: 31px;
      font-weight: 700;
      color: white;
    }

    .content {
      padding: 40px 45px;
    }

    .box {
      margin-bottom: 32px;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
    }

    .box-title {
      background: linear-gradient(90deg, #1e40af, #3b82f6);
      padding: 18px 0;
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      color: white;
    }

    .box-content {
      background: #0a1428;
      min-height: 145px;
      border: 3px solid #1e40af;
      border-top: none;
      padding: 30px;
      font-size: 36px;
      font-weight: 700;
      color: #67b3ff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1.3;
      outline: none;
      position: relative;
    }

    .box-content::before {
      content: attr(data-placeholder);
      position: absolute;
      color: rgba(103, 179, 255, 0.18);
      font-size: 32px;
      font-weight: 400;
      pointer-events: none;
      display: none;
    }

    .box-content:empty::before {
      display: block;
    }

    .big-box .box-content {
      min-height: 310px;
      font-size: 52px;
      color: #93c5fd;
    }

    .big-box .box-content::before {
      font-size: 42px;
    }

    .download-btn {
      margin: 25px auto 0;
      display: block;
      background: #3b82f6;
      color: white;
      border: none;
      padding: 18px 55px;
      font-size: 19px;
      font-weight: 700;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 12px 35px rgba(59, 130, 246, 0.5);
    }

    .download-btn:hover {
      background: #2563eb;
      transform: translateY(-3px);
    }
  </style>
</head>
<body>

  <div class="infographic" id="capture-area">
    <!-- 헤더 -->
    <div class="header">
      <div class="logo">BlackRock®</div>
      <div class="title">블랙록 추천 종목</div>
    </div>

    <div class="content">
      <!-- 추천 종목명 -->
      <div class="box">
        <div class="box-title">추천 종목 명</div>
        <div class="box-content" id="stockName" contenteditable="true" data-placeholder="종목명을 입력하세요"></div>
      </div>

      <!-- 수익률 -->
      <div class="box big-box">
        <div class="box-title">수익률</div>
        <div class="box-content" id="returnRate" contenteditable="true" data-placeholder="+000.0%"></div>
      </div>
    </div>
  </div>

  <!-- 다운로드 버튼 (이미지에는 안 들어감) -->
  <button class="download-btn" onclick="downloadImage()">
    📥 이미지로 저장하기
  </button>

  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <script>
    function downloadImage() {
      const area = document.getElementById('capture-area');
      
      html2canvas(area, {
        scale: 2.8,
        backgroundColor: '#0a1428',
        logging: false
      }).then(canvas => {
        const link = document.createElement('a');
        link.download = '블랙록_추천종목.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      });
    }
  </script>
</body>
</html>
