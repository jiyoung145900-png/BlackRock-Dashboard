<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Stock Analysis | BlackRock Labs</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #020408;
      --card: rgba(13, 17, 28, 0.8);
      --accent: #00b4ff;
      --up: #ff3333;
      --border: rgba(255, 255, 255, 0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
      background-color: var(--bg);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* --- 고급 배경 시스템 --- */
    .bg-canvas {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: radial-gradient(circle at 50% -20%, #1a2236 0%, #020408 80%);
    }
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 50px 50px;
      mask-image: radial-gradient(circle at center, black, transparent 80%);
      opacity: 0.3;
    }

    /* --- 메인 카드 --- */
    .main-card {
      width: 100%;
      max-width: 600px;
      background: var(--card);
      backdrop-filter: blur(30px);
      border: 1px solid var(--border);
      border-radius: 32px;
      padding: 40px;
      box-shadow: 0 50px 100px rgba(0,0,0,0.8);
      position: relative;
    }

    .live-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 51, 51, 0.1);
      color: var(--up);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .live-dot {
      width: 6px;
      height: 6px;
      background: var(--up);
      border-radius: 50%;
      animation: blink 1s infinite;
    }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .title {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 40px;
      background: linear-gradient(to right, #fff, #888);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* --- 데이터 박스 --- */
    .data-group { margin-bottom: 30px; }
    .label {
      font-size: 13px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 15px;
      display: block;
    }

    .stock-display {
      background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 30px;
      text-align: center;
      transition: 0.3s;
    }

    .stock-name {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 10px;
      text-shadow: 0 0 20px rgba(255,255,255,0.2);
    }

    .profit-value {
      font-size: 54px;
      font-weight: 800;
      color: var(--up);
      font-family: 'Inter';
    }
    .profit-value span { font-size: 24px; margin-left: 2px; }

    /* --- 수정 모드 컨트롤러 --- */
    .admin-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--card);
      border: 1px solid var(--border);
      color: #fff;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    .edit-panel {
      display: none;
      background: #161b22;
      border: 1px solid var(--accent);
      padding: 20px;
      border-radius: 20px;
      position: absolute;
      width: 100%;
      z-index: 200;
    }
    .edit-panel input {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      padding: 12px;
      color: #fff;
      margin-bottom: 10px;
      border-radius: 8px;
    }
    .save-btn {
      width: 100%;
      background: var(--accent);
      border: none;
      padding: 12px;
      color: #fff;
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
    }

    .btn-main {
      width: 100%;
      background: #fff;
      color: #000;
      border: none;
      padding: 22px;
      border-radius: 18px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 20px;
      transition: 0.3s;
    }
    .btn-main:hover { transform: scale(1.02); filter: brightness(0.9); }
  </style>
</head>
<body>

<div class="bg-canvas"><div class="bg-grid"></div></div>

<div class="main-card">
  <div class="live-tag">
    <div class="live-dot"></div> Live Analysis
  </div>
  
  <h1 class="title">Exclusive<br>Recommendation</h1>

  <div class="data-group">
    <span class="label">Target Stock</span>
    <div class="stock-display">
      <div class="stock-name" id="displayStock">삼성전자 (005930)</div>
    </div>
  </div>

  <div class="data-group">
    <span class="label">Expected Return</span>
    <div class="stock-display" style="border-color: rgba(255, 51, 51, 0.2);">
      <div class="profit-value" id="displayProfit">+42.5<span>%</span></div>
    </div>
  </div>

  <button class="btn-main">Get Full Report</button>

  <div id="editPanel" class="edit-panel">
    <input type="text" id="inputStock" placeholder="종목명 입력">
    <input type="text" id="inputProfit" placeholder="수익률 입력 (예: +45.2)">
    <button class="save-btn" onclick="saveData()">적용하기</button>
  </div>
</div>

<button class="admin-btn" onclick="toggleEdit()">⚙️</button>

<script>
  function toggleEdit() {
    const panel = document.getElementById('editPanel');
    panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
  }

  function saveData() {
    const stock = document.getElementById('inputStock').value;
    const profit = document.getElementById('inputProfit').value;
    
    if(stock) document.getElementById('displayStock').innerText = stock;
    if(profit) document.getElementById('displayProfit').innerHTML = profit + '<span>%</span>';
    
    toggleEdit();
  }
</script>

</body>
</html>
