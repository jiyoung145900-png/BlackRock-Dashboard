<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackRock Premium Report v2</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

        :root {
            --br-blue: #1a365d;
            --br-accent: #00b4ff;
            --card-shadow: 0 30px 60px rgba(0,0,0,0.2);
        }

        body {
            background-color: #f1f5f9;
            font-family: 'Noto Sans KR', sans-serif;
            display: flex; flex-direction: column; align-items: center; padding: 40px 0;
            margin: 0;
        }

        /* 메인 리포트 카드 */
        .report-card {
            width: 520px;
            background: #ffffff;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: var(--card-shadow);
            border: 1px solid #e2e8f0;
        }

        /* 고급스러운 헤더 */
        .header {
            background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%);
            padding: 30px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 5px solid var(--br-blue);
        }

        .logo-area { font-size: 34px; font-weight: 900; color: #000; letter-spacing: -2px; }
        
        .title-area { text-align: right; }
        .main-title { 
            background: var(--br-blue); color: white; padding: 6px 16px; 
            font-size: 19px; font-weight: 700; border-radius: 8px;
        }
        .date-text { font-size: 16px; color: #475569; margin-top: 8px; font-weight: 900; }

        .content { padding: 35px; background: #fff; }

        /* 입체감 있는 박스 */
        .info-box {
            border: 1px solid #e2e8f0; border-radius: 20px;
            margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            background: #fff; overflow: hidden;
        }

        .box-header {
            background: var(--br-blue); color: white; text-align: center;
            padding: 12px; font-size: 15px; font-weight: 700; letter-spacing: 1px;
        }

        .box-body {
            padding: 25px; text-align: center; font-size: 38px;
            font-weight: 900; color: #0f172a; outline: none;
        }

        /* 수익률: 다크 모드 입체 박스 */
        .profit-card {
            background: #1e293b; color: white; border-radius: 16px;
            padding: 25px; margin: 15px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
            text-align: center;
        }

        .buy-call { font-size: 23px; font-weight: 700; margin-bottom: 12px; outline: none; }
        .sell-call { font-size: 21px; font-weight: 700; color: var(--br-accent); outline: none; }

        /* 리스트 영역: 정렬 버그 수정 */
        .analysis-list {
            padding: 5px 10px; color: #1e293b; font-size: 15.5px; line-height: 1.8;
            outline: none; min-height: 100px;
        }
        
        /* 리스트 아이템 스타일 (자바스크립트가 생성) */
        .analysis-list div {
            position: relative;
            padding-left: 25px;
            margin-bottom: 12px;
            text-align: left; /* 왼쪽 정렬 강제 */
            display: block; /* 계단 현상 방지 */
        }

        .analysis-list div::before {
            content: '●'; position: absolute; left: 0; 
            font-size: 10px; color: var(--br-blue); top: 1px;
        }

        .save-btn {
            margin-top: 40px; background: var(--br-blue); color: white;
            border: none; padding: 16px 45px; font-size: 18px; font-weight: 700;
            border-radius: 50px; cursor: pointer; transition: 0.3s;
            box-shadow: 0 15px 30px rgba(26, 54, 93, 0.3);
        }
        .save-btn:hover { transform: translateY(-3px); background: #102a43; }
    </style>
</head>
<body>

    <div class="report-card" id="reportArea">
        <div class="header">
            <div class="logo-area">BlackRock.</div>
            <div class="title-area">
                <div class="main-title">블랙록 추천 종목</div>
                <div class="date-text" id="todayDate"></div>
            </div>
        </div>

        <div class="content">
            <div class="info-box">
                <div class="box-header">추천 종목 명</div>
                <div class="box-body" contenteditable="true">HMM 011200</div>
            </div>

            <div class="info-box">
                <div class="box-header">수익률</div>
                <div class="profit-card">
                    <div class="buy-call" contenteditable="true">매수 권장 : 21,270원 이하</div>
                    <div class="sell-call" contenteditable="true">매도 권장 : 매니저 사인 대기</div>
                </div>
            </div>

            <div class="analysis-list" id="editableList" contenteditable="true">
                <div>중동 리스크 확대 시 운임 상승 기대 → 실제 전쟁 국면 수혜</div>
                <div>해운 업황 둔화 속에서도 두 자릿수 영업이익 유지</div>
            </div>
        </div>
    </div>

    <button class="save-btn" onclick="saveImage()">📥 프리미엄 리포트 저장</button>

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script>
        // 날짜 세팅
        const d = new Date();
        document.getElementById('todayDate').innerText = `${d.getMonth() + 1}월 ${d.getDate()}일`;

        // 계단 현상 해결된 엔터 로직
        const list = document.getElementById('editableList');
        list.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                const selection = window.getSelection();
                const range = selection.getRangeAt(0);
                
                // 새로운 div 생성 (계단 현상 방지를 위해 일관된 태그 사용)
                const newDiv = document.createElement('div');
                newDiv.innerHTML = '새 항목을 입력하세요'; // 초기 텍스트
                
                // 현재 노드 다음에 삽입
                range.insertNode(newDiv);
                
                // 커서를 새 div로 이동
                range.setStart(newDiv, 0);
                range.setEnd(newDiv, 1);
                range.collapse(false);
                
                selection.removeAllRanges();
                selection.addRange(range);
            }
        });

        async function saveImage() {
            const btn = document.querySelector('.save-btn');
            btn.innerText = "⏳ 고해상도 변환 중...";
            const canvas = await html2canvas(document.getElementById('reportArea'), {
                scale: 3,
                useCORS: true,
                backgroundColor: "#f1f5f9"
            });
            const link = document.createElement('a');
            link.download = `BlackRock_Report_${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            btn.innerText = "📥 프리미엄 리포트 저장";
        }
    </script>
</body>
</html>
