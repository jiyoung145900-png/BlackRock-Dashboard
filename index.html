<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackRock High-End Report</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Orbitron:wght@700&display=swap');

        :root {
            --metal-bg: #b0bfc9;
            --br-blue: #1e3a5a;
            --glass-blue: rgba(173, 216, 230, 0.3);
            --placeholder-color: rgba(0, 0, 0, 0.3);
        }

        body {
            background-color: #f1f5f9;
            font-family: 'Noto Sans KR', sans-serif;
            display: flex; flex-direction: column; align-items: center; padding: 40px 0; margin: 0;
        }

        /* 메인 카드: 금속 회로 느낌 배경 */
        .report-card {
            width: 550px;
            background: var(--metal-bg);
            background-image: 
                linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px),
                linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            border-radius: 20px;
            padding: 4px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.25);
            position: relative;
            border: 1px solid #94a3b8;
        }

        /* 헤더 디자인 */
        .header {
            background: linear-gradient(135deg, #cbd5e1 0%, #94a3b8 100%);
            padding: 25px 30px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 5px solid var(--br-blue);
            border-radius: 16px 16px 0 0;
        }

        .logo { font-family: 'Orbitron', sans-serif; font-size: 38px; font-weight: 900; color: #000; letter-spacing: -1.5px; }
        .title-area { text-align: right; }
        .main-title { background: var(--br-blue); color: white; padding: 6px 18px; font-size: 19px; font-weight: 700; border-radius: 4px; }
        .date-text { font-size: 16px; color: #334155; margin-top: 6px; font-weight: 900; }

        .content { padding: 30px; }

        /* 유리 질감 박스 */
        .glass-box {
            background: var(--glass-blue);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 16px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1), inset 0 0 20px rgba(255,255,255,0.2);
            overflow: hidden;
        }

        .box-label {
            background: rgba(30, 58, 90, 0.85);
            color: white; text-align: center; padding: 10px; font-size: 15px; font-weight: 700;
        }

        /* 입력 영역 및 플레이스홀더 */
        .editable {
            padding: 25px; text-align: center; font-size: 36px; font-weight: 900;
            color: #000; outline: none; position: relative;
        }
        .editable:empty:before {
            content: attr(data-placeholder);
            color: var(--placeholder-color);
            font-weight: 400;
        }

        /* 수익률 다크 박스 */
        .profit-card {
            background: rgba(15, 23, 42, 0.85);
            border-radius: 14px; margin: 15px; padding: 30px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
            text-align: center;
        }
        .profit-input { font-size: 24px; font-weight: 700; color: white; outline: none; margin-bottom: 10px; }
        .profit-input.accent { color: #38bdf8; font-size: 22px; }
        .profit-input:empty:before { content: attr(data-placeholder); color: rgba(255,255,255,0.3); }

        /* 리스트 영역: 정렬 및 엔터 기능 */
        .analysis-list {
            padding: 5px 10px; color: #1a202c; font-size: 16px; line-height: 1.8;
            outline: none;
        }
        .analysis-list ul { margin: 0; padding: 0; list-style: none; }
        .analysis-list li {
            position: relative; padding-left: 28px; margin-bottom: 12px;
            text-align: left; font-weight: 500;
        }
        .analysis-list li::before {
            content: '●'; position: absolute; left: 0; color: #000; font-size: 10px; top: 1px;
        }

        .save-btn {
            margin-top: 40px; background: var(--br-blue); color: white;
            border: none; padding: 18px 50px; font-size: 18px; font-weight: 700;
            border-radius: 60px; cursor: pointer; transition: 0.3s;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }
        .save-btn:hover { transform: translateY(-3px); background: #112a45; }
    </style>
</head>
<body>

    <div class="report-card" id="reportArea">
        <div class="header">
            <div class="logo">BlackRock.</div>
            <div class="title-area">
                <div class="main-title">블랙록 추천 종목</div>
                <div class="date-text" id="todayDate">4월 13일</div>
            </div>
        </div>

        <div class="content">
            <div class="glass-box">
                <div class="box-label">추천 종목 명</div>
                <div class="editable" contenteditable="true" data-placeholder="HMM 011200"></div>
            </div>

            <div class="glass-box">
                <div class="box-label">수익률</div>
                <div class="profit-card">
                    <div class="profit-input" contenteditable="true" data-placeholder="매수 권장 : 21,270원 이하"></div>
                    <div class="profit-input accent" contenteditable="true" data-placeholder="매도 권장 : 매니저 사인 대기"></div>
                </div>
            </div>

            <div class="analysis-list">
                <ul contenteditable="true">
                    <li>중동 리스크 확대 시 운임 상승 기대 → 실제 전쟁 국면 수혜</li>
                    <li>해운 업황 둔화 속에서도 두 자릿수 영업이익 유지</li>
                    <li>여기에 새로운 내용을 입력하세요 (엔터 시 자동 정렬)</li>
                </ul>
            </div>
        </div>
    </div>

    <button class="save-btn" onclick="saveImage()">📥 고해상도 리포트 저장</button>

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script>
        // 날짜 자동 설정
        const d = new Date();
        document.getElementById('todayDate').innerText = `${d.getMonth() + 1}월 ${d.getDate()}일`;

        // 이미지 저장 함수 (고화질)
        async function saveImage() {
            const btn = document.querySelector('.save-btn');
            btn.innerText = "⏳ 생성 중...";
            const canvas = await html2canvas(document.getElementById('reportArea'), {
                scale: 3,
                useCORS: true,
                backgroundColor: "#f1f5f9"
            });
            const link = document.createElement('a');
            link.download = `BlackRock_Report_${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
            btn.innerText = "📥 고해상도 리포트 저장";
        }
    </script>
</body>
</html>
