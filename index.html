<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>블랙록 추천 종목</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
    
    body {
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
      font-family: 'Noto Sans KR', sans-serif;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 820px;
      background: rgba(15, 23, 42, 0.95);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 25px 70px rgba(0, 0, 0, 0.7);
      border: 1px solid rgba(59, 130, 246, 0.4);
    }

    .header {
      background: linear-gradient(90deg, #1e40af, #3b82f6);
      padding: 28px 35px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 46px;
      font-weight: 900;
      letter-spacing: -2px;
    }

    .main-title {
      font-size: 29px;
      font-weight: 700;
    }

    .content {
      padding: 35px;
    }

    .box {
      margin-bottom: 28px;
      border-radius: 16px;
      overflow: hidden;
    }

    .box-title {
      background: #1e40af;
      padding: 16px 24px;
      font-size: 19px;
      font-weight: 700;
      text-align: center;
    }

    .box-content {
      background: #0f172a;
      min-height: 130px;
      border: 3px solid #1e40af;
      border-top: none;
      padding: 30px;
      font-size: 32px;
      font-weight: 700;
      color: #60a5fa;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1.3;
    }

    .big-box .box-content {
      min-height: 280px;
      font-size: 42px;
      color: #93c5fd;
    }

    .download-btn {
      margin: 30px auto;
      display: block;
      background: #3b82f6;
      color: white;
      border: none;
      padding: 16px 40px;
      font-size: 18px;
      font-weight: 700;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4);
      transition: all 0.3s;
    }

    .download-btn:hover {
      background: #2563eb;
      transform: translateY(-3px);
    }

    .footer-line {
      height: 10px;
      background: linear-gradient(90deg, #3b82f6, #60a5fa);
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 헤더 -->
    <div class="header">
      <div class="logo">BlackRock®</div>
      <div class="main-title">블랙록 추천 종목</div>
    </div>

    <div class="content">
      <!-- 추천 종목명 -->
      <div class="box">
        <div class="box-title">추천 종목 명</div>
        <div class="box-content" id="stockName" contenteditable="true">
          종목명을 여기에 입력하세요
        </div>
      </div>

      <!-- 수익률 -->
      <div class="box big-box">
        <div class="box-title">수익률</div>
        <div class="box-content" id="returnRate" contenteditable="true">
          +000.0%
        </div>
      </div>
    </div>

    <!-- 다운로드 버튼 -->
    <button class="download-btn" onclick="downloadImage()">
      📥 이미지로 다운로드 하기
    </button>

    <div class="footer-line"></div>
  </div>

  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <script>
    function downloadImage() {
      const container = document.querySelector('.container');
      
      html2canvas(container, {
        scale: 2,           // 해상도 높게
        backgroundColor: '#0f172a'
      }).then(canvas => {
        const link = document.createElement('a');
        link.download = '블랙록_추천종목.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      });
    }
  </script>
</body>
</html>
