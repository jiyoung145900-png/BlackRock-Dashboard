<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>블랙록 데일리 추천 종목</title>
  <style>
    /* 1. 구글 폰트 및 기본 스타일 정의 */
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap');
    
    :root {
      --bg-main: #d1dbe4; /* 원본의 연한 블루그레이 배경 */
      --text-dark: #1a1a1a;
      --text-mid: #4a5568;
      --accent-blue: #234c75; /* 박스 헤더 및 강조색 */
      --accent-light-blue: #00b4ff; /* 매도 권장 텍스트 색상 */
      --card-bg: #ffffff;
      --border-color: #cbd5e0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--bg-main);
      font-family: 'Noto Sans KR', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* 2. 메인 리포트 컨테이너 */
    .report-container {
      width: 100%;
      max-width: 500px; /* 원본 이미지 비율 고려 */
      background: var(--card-bg);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
      position: relative;
    }

    /* 3. 헤더 영역 (로고, 타이틀, 날짜) */
    .header {
      background: #f8fafc;
      padding: 20px 25px;
      border-bottom: 2px solid #e2e8f0;
      display: flex;
      flex-direction: column;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 5px;
    }

    .logo-text {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -1.5px;
      color: #000;
    }

    .report-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent-blue);
    }

    .date-text {
      align-self: flex-end;
      font-size: 14px;
      color: var(--text-mid);
      font-weight: 400;
    }

    /* 4. 콘텐츠 영역 (종목명, 수익률) */
    .content {
      padding: 25px;
    }

    /* 공통 박스 스타일 */
    .info-box {
      border: 1px solid var(--border-color);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 25px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.03);
    }

    .info-box-header {
      background-color: var(--accent-blue);
      color: white;
      text-align: center;
      padding: 10px 0;
      font-size: 15px;
      font-weight: 700;
    }

    .info-box-body {
      padding: 25px;
      text-align: center;
    }

    /* 종목명 박스 특정 스타일 */
    .stock-name-box .info-box-body {
      font-size: 32px;
      font-weight: 900;
      color: #000;
      letter-spacing: -1px;
    }

    /* 수익률 박스 특정 스타일 */
    .return-box .info-box-body {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      background-color: #334155; /* 원본의 어두운 내부 박스 색상 */
      margin: 15px;
      border-radius: 8px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .price-call { color: #fff; }
    .status-call { color: var(--accent-light-blue); }

    /* 5. 분석 포인트 (리스트) 영역 */
    .analysis-section {
      padding: 0 10px;
    }

    .analysis-list {
      list-style: none;
      font-size: 14.5px;
      color: var(--text-dark);
      line-height: 1.7;
    }

    .analysis-list li {
      margin-bottom: 15px;
      position: relative;
      padding-left: 20px;
    }

    .analysis-list li::before {
      content: '●';
      font-size: 8px;
      color: var(--text-dark);
      position: absolute;
      left: 0;
      top: 6px;
    }

    /* 저장 버튼 스타일 */
    .save-btn {
      margin-top: 30px;
      background-color: var(--accent-blue);
      color: white;
      border: none;
      padding: 15px 40px;
      font-size: 16px;
      font-weight: 700;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(35, 76, 117, 0.3);
      transition: all 0.2s;
    }

    .save-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 25px rgba(35, 76, 117, 0.4);
    }
  </style>
</head>
<body>

  <div class="report-container" id="reportArea">
    <div class="header">
      <div class="header-top">
        <div class="logo-text">BlackRock.</div>
        <div class="report-title">블랙록 추천 종목</div>
      </div>
      <div class="date-text" id="todayDate"></div>
    </div>

    <div class="content">
      <div class="info-box stock-name-box">
        <div class="info-box-header">추천 종목 명</div>
        <div class="info-box-body">
          HMM 011200
        </div>
      </div>

      <div class="info-box return-box">
        <div class="info-box-header">수익률</div>
        <div class="info-box-body">
          <div class="price-call">매수 권장 : 21,270원 이하</div>
          <div class="status-call">매도 권장 : 매니저 사인 대기</div>
        </div>
      </div>

      <div class="analysis-section">
        <ul class="analysis-list">
          <li>중동 리스크 확대 시 운임 상승 기대 → 실제 전쟁 국면에서 주가 단기 급등 사례 (운임 민감 수혜주)</li>
          <li>해운 업황 둔화 속에서도 두 자릿수 영업이익 유지 · 수익성 방어력 업계 최고 수준으로 평가</li>
          <li>AI + 지정학 + 업황 방어력 3가지가 동시에 붙은 해운 핵심 종목</li>
        </ul>
      </div>
    </div>
  </div>

  <button class="save-btn" id="saveBtn">📥 리포트 이미지로 저장</button>

  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <script>
    // 1. 자동 날짜 업데이트 기능
    function updateDate() {
      const now = new Date();
      const month = now.getMonth() + 1; // 월은 0부터 시작하므로 +1
      const date = now.getDate();
      
      const dateString = `${month}월 ${date}일`;
      document.getElementById('todayDate').innerText = dateString;
    }

    // 페이지 로드 시 날짜 업데이트 실행
    updateDate();

    // 2. 이미지 다운로드 함수 (기존 코드 최적화 적용)
    document.getElementById('saveBtn').addEventListener('click', async () => {
      const btn = document.getElementById('saveBtn');
      const area = document.getElementById('reportArea');
      
      btn.innerText = "⏳ 생성 중...";
      btn.style.opacity = "0.7";

      try {
        await document.fonts.ready; // 폰트 로드 대기

        setTimeout(() => {
          html2canvas(area, {
            scale: 3, // 고해상도
            useCORS: true,
            backgroundColor: '#d1dbe4', // 배경색 지정
            logging: false
          }).then(canvas => {
            const link = document.createElement('a');
            link.download = `BlackRock_HMM_리포트_${new Date().getTime()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            
            btn.innerText = "📥 리포트 이미지로 저장";
            btn.style.opacity = "1";
          });
        }, 100);
      } catch (err) {
        console.error("이미지 생성 실패:", err);
        alert("이미지 생성 중 오류가 발생했습니다.");
        btn.innerText = "📥 리포트 이미지로 저장";
      }
    });
  </script>
</body>
</html>
